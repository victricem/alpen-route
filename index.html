<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2026 立山黑部全線即時時刻表</title>
    
    <link rel="manifest" href="manifest.json">
    
    <meta name="theme-color" content="#1e3a8a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="立山時刻表">
    <link rel="apple-touch-icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%231e3a8a'><path d='M12 3l-9 15h18z'/></svg>">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50 min-h-screen">

    <header class="bg-alpine text-white p-6 shadow-lg sticky top-0 z-50 pt-safe">
        <div class="max-w-md mx-auto flex justify-between items-start">
            <div>
                <h1 class="text-2xl font-black tracking-tight" data-i18n="app_title">立山黑部時刻表</h1>
                <p class="text-blue-200 text-xs mt-1 font-semibold tracking-wider uppercase" data-i18n="app_subtitle">Alpine Route 2026</p>
            </div>
            <div class="flex flex-col items-end gap-2">
                <select id="lang-select" onchange="changeLanguage(this.value)" class="bg-white/20 text-white border border-white/30 rounded-lg px-2 py-1 text-[10px] font-bold outline-none cursor-pointer hover:bg-white/30 transition-colors">
                    <option value="zh-TW" class="text-gray-800">繁體中文</option>
                    <option value="ja" class="text-gray-800">日本語</option>
                    <option value="en" class="text-gray-800">English</option>
                    <option value="zh-CN" class="text-gray-800">简体中文</option>
                </select>
                <div class="text-right bg-black/20 px-2 py-1.5 rounded-lg backdrop-blur-sm border border-white/10">
                    <div id="current-time" class="text-lg leading-none font-mono font-bold tracking-widest">--:--:--</div>
                    <div id="current-date" class="text-[9px] text-blue-100 uppercase tracking-widest mt-1 text-right"></div>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4 pb-24">
        
        <div class="mb-4 bg-white p-3.5 rounded-xl shadow-sm border-2 border-indigo-100 flex justify-between items-center">
            <label class="text-xs font-bold text-indigo-800 flex items-center tracking-wider">
                <svg class="w-4 h-4 mr-1.5 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                <span data-i18n="travel_date">預定乘車日期</span>
            </label>
            <input type="date" id="travel-date" class="text-sm font-black text-indigo-700 bg-indigo-50 border border-indigo-100 rounded-lg outline-none px-3 py-1.5 cursor-pointer hover:bg-indigo-100 transition-colors" onchange="onDateChange()">
        </div>

        <div class="mb-5 relative">
            <label class="block text-gray-500 text-xs font-bold mb-2 uppercase tracking-wider flex items-center">
                <svg class="w-4 h-4 mr-1 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                <span data-i18n="select_station">選擇當前所在車站</span>
            </label>
            <div class="relative">
                <select id="station-select" onchange="onStationChange()" class="block appearance-none w-full bg-white border-2 border-blue-500 text-blue-900 py-3.5 px-4 pr-8 rounded-xl font-bold shadow-sm focus:outline-none focus:ring-4 focus:ring-blue-100 transition-all text-lg cursor-pointer">
                    <option value="ogizawa" data-i18n="st_ogizawa">🚉 扇澤站 (Ogizawa)</option>
                    <option value="kurobe_dam" data-i18n="st_kurobe_dam">🌊 黑部水庫 (Kurobe Dam)</option>
                    <option value="kurobeko" data-i18n="st_kurobeko">🛳️ 黑部湖 (Kurobeko)</option>
                    <option value="kurobedaira" data-i18n="st_kurobedaira">⛰️ 黑部平 (Kurobedaira)</option>
                    <option value="daikanbo" data-i18n="st_daikanbo">🔭 大觀峰 (Daikanbo)</option>
                    <option value="murodo" data-i18n="st_murodo">❄️ 室堂 (Murodo) - 雪之大谷</option>
                    <option value="bijodaira" data-i18n="st_bijodaira">🌲 美女平 (Bijodaira)</option>
                    <option value="tateyama" data-i18n="st_tateyama">🚉 立山車站 (Tateyama)</option>
                </select>
                <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-blue-500">
                    <svg class="fill-current h-5 w-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"><path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z"/></svg>
                </div>
            </div>
        </div>

        <div id="route-buttons" class="flex gap-2 mb-6">
            </div>

        <div id="countdown-card" class="next-bus-card bg-white rounded-2xl shadow-lg p-6 mb-6 border-t-4 border-blue-600 relative overflow-hidden transition-all duration-300">
            <div class="absolute -right-6 -top-6 w-24 h-24 bg-blue-50 rounded-full opacity-50 pointer-events-none"></div>
            
            <h2 class="text-gray-500 text-sm font-bold mb-3 flex items-center uppercase tracking-wide">
                <svg class="w-4 h-4 mr-1.5 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                <span id="countdown-label">--</span>
            </h2>
            <div id="countdown" class="text-5xl md:text-6xl font-black text-blue-700 mb-5 tracking-tighter tabular-nums">
                --:--
            </div>
            <div class="flex justify-between items-end border-t border-gray-100 pt-4">
                <div>
                    <span class="text-gray-400 text-xs font-bold block mb-1 uppercase tracking-widest" id="time-label">--</span>
                    <span id="next-time" class="text-3xl font-black text-gray-800 tracking-tight">--:--</span>
                </div>
                <div class="text-right flex flex-col items-end">
                    <span id="route-vehicle" class="bg-blue-100 text-blue-800 px-3 py-1.5 rounded-lg text-xs font-bold shadow-sm border border-blue-200">
                        --
                    </span>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden relative">
            <div class="p-4 border-b border-gray-200 bg-gray-50 flex justify-between items-center relative z-40">
                <h3 id="timetable-title" class="font-bold text-gray-800 flex items-center text-sm">
                    <svg class="w-4 h-4 mr-2 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                    <span id="table-title-text">--</span>
                </h3>
                <span class="text-[10px] bg-gray-200 text-gray-600 px-2 py-1 rounded font-bold tracking-wider">2026</span>
            </div>
            
            <div id="timetable-legend" class="px-4 py-3 bg-white border-b border-gray-100 text-[10px] text-gray-600 flex flex-col gap-2 relative z-40">
                <div class="flex flex-wrap gap-x-3 gap-y-2">
                    <span class="flex items-center"><span class="w-4 h-4 rounded-full bg-red-500 text-white flex items-center justify-center mr-1 scale-90 font-bold">●</span> <span data-i18n="l_spec">指定日</span></span>
                    <span class="flex items-center"><span class="w-4 h-4 rounded-full bg-pink-500 text-white flex items-center justify-center mr-1 scale-90 font-bold">◇</span> <span data-i18n="l_peak">旺季</span></span>
                    <span class="flex items-center"><span class="w-4 h-4 rounded-full bg-purple-500 text-white flex items-center justify-center mr-1 scale-90 font-bold">※</span> <span data-i18n="l_holi">特定假日</span></span>
                    <span class="flex items-center"><span class="w-4 h-4 rounded-full bg-blue-500 text-white flex items-center justify-center mr-1 scale-90 font-bold">▽</span> <span data-i18n="l_wd">平日限定</span></span>
                    <span class="flex items-center"><span class="w-4 h-4 rounded-full bg-orange-500 text-white flex items-center justify-center mr-1 scale-90 font-bold">▼</span> <span data-i18n="l_we">假日限定</span></span>
                </div>
                <div class="text-[9px] text-gray-400 bg-gray-50 p-2.5 rounded-lg leading-relaxed border border-gray-100">
                    <strong class="text-gray-500 block mb-0.5" data-i18n="l_cal">2026 特殊運轉日曆：</strong>
                    <span class="text-red-400">●</span> <span data-i18n="l_d1">5/2-5, 7/18-19, 8/11-15, 9/19-22, 10/10-11</span><br>
                    <span class="text-pink-400">◇</span> <span data-i18n="l_d2">4/15-5/15 及上方全部指定日</span><br>
                    <span class="text-purple-400">※</span> <span data-i18n="l_d3">特定期間內的週末與日本國定假日</span><br>
                    <span class="text-indigo-400 font-bold block mt-1" data-i18n="l_hint">💡 系統會依據您選擇的乘車日期，自動將當天沒有營運的班次變成灰色並劃上刪除線。</span>
                </div>
            </div>

            <div class="max-h-80 overflow-y-auto bg-white relative">
                <table class="w-full text-left border-collapse" id="timetable-table">
                    <thead id="timetable-head" class="relative z-30">
                        <tr class="text-xs uppercase text-gray-600 bg-gray-100 sticky top-0 shadow-md">
                            <th class="px-6 py-3 font-bold w-20 bg-gray-100" data-i18n="th_h">時 (H)</th>
                            <th class="px-6 py-3 font-bold bg-gray-100" data-i18n="th_m">發車分鐘 (Minutes)</th>
                        </tr>
                    </thead>
                    <tbody id="timetable-body" class="divide-y divide-gray-100 relative z-0">
                        </tbody>
                </table>
            </div>
        </div>

    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 p-2 flex justify-around items-center md:hidden pb-safe z-50">
        <a href="#" onclick="window.scrollTo({top: 0, behavior: 'smooth'})" class="flex flex-col items-center p-2 text-blue-600">
            <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 10l7-7m0 0l7 7m-7-7v18"></path></svg>
            <span class="text-[10px] font-bold" data-i18n="f_top">置頂</span>
        </a>
        <button onclick="window.location.reload()" class="flex flex-col items-center p-2 text-gray-500 hover:text-blue-600 transition-colors">
            <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
            <span class="text-[10px] font-bold" data-i18n="f_refresh">重新對時</span>
        </button>
    </nav>

    <script src="i18n.js"></script>
    <script src="schedules.js"></script>
    <script src="app.js"></script>
</body>
</html>
